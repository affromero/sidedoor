version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns:
          - '*'
    ignore:
      # Major toolchain bumps (TypeScript, ESLint, Vitest, react-hooks) need
      # code changes, so they are adopted deliberately, not via an auto PR.
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
