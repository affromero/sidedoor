version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Minimum release age: wait 7 days before proposing any update, so a freshly
    # published (possibly compromised or broken) release is never pulled in.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    # TS 7 (tsgo) breaks typescript-eslint at runtime — its peer caps at
    # typescript <6.1.0 and it hits TS compiler internals the native rewrite
    # changed. Remove once typescript-eslint ships TS 7 support.
    ignore:
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
    groups:
      npm:
        patterns:
          - '*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Minimum release age: wait 7 days before proposing any update, so a freshly
    # published (possibly compromised or broken) release is never pulled in.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
