name: Scorecard

# OpenSSF Scorecard rates the repository's supply chain security posture
# (branch protection, pinned dependencies, token permissions, and more) and
# publishes the result so the README badge and the Security tab can show it.

on:
  branch_protection_rule:
  schedule:
    - cron: '23 7 * * 1'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
