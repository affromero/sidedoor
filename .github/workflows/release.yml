name: Release

# Publishes thesidedoor to npm on every v* tag. The version published is
# whatever is in package.json at the tagged commit, so bump the version and
# regenerate the lockfile before tagging (the create-release flow does this).
#
# Supply chain: publishes with npm provenance, a signed attestation linking the
# tarball to this repo, commit, and workflow run. Provenance needs id-token:
# write, a public repo, and the npm registry configured by setup-node.
#
# NPM_TOKEN must be an automation or granular publish token for thesidedoor.
# GitHub Release notes are created separately by the release flow, not here.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
